syntax = "proto3";

package remotemessage;
option java_package = "com.remotify.app.proto";
option java_multiple_files = true;

message RemoteMessage {
  RemoteKeyInject remote_key_inject = 2;
  RemotePingRequest ping_request = 3;
  RemotePingResponse ping_response = 4;
  RemotePointerInject remote_pointer_inject = 5;
}

message RemotePointerInject {
  int32 x = 1;
  int32 y = 2;
  PointerDirection direction = 3;
}

enum PointerDirection {
  UNKNOWN_POINTER_DIRECTION = 0;
  DOWN = 1;
  UP = 2;
  MOVE = 3;
}

message RemoteKeyInject {
  RemoteKeyCode key_code = 1;
  RemoteDirection direction = 2;
}

enum RemoteKeyCode {
  KEYCODE_UNKNOWN = 0;
  KEYCODE_SOFT_LEFT = 1;
  KEYCODE_SOFT_RIGHT = 2;
  KEYCODE_HOME = 3;
  KEYCODE_BACK = 4;
  KEYCODE_CALL = 5;
  KEYCODE_ENDCALL = 6;
  KEYCODE_0 = 7;
  KEYCODE_1 = 8;
  KEYCODE_2 = 9;
  KEYCODE_3 = 10;
  KEYCODE_4 = 11;
  KEYCODE_5 = 12;
  KEYCODE_6 = 13;
  KEYCODE_7 = 14;
  KEYCODE_8 = 15;
  KEYCODE_9 = 16;
  KEYCODE_STAR = 17;
  KEYCODE_POUND = 18;
  KEYCODE_DPAD_UP = 19;
  KEYCODE_DPAD_DOWN = 20;
  KEYCODE_DPAD_LEFT = 21;
  KEYCODE_DPAD_RIGHT = 22;
  KEYCODE_DPAD_CENTER = 23;
  KEYCODE_VOLUME_UP = 24;
  KEYCODE_VOLUME_DOWN = 25;
  KEYCODE_POWER = 26;
  KEYCODE_CAMERA = 27;
  KEYCODE_CLEAR = 28;
}

enum RemoteDirection {
  UNKNOWN_DIRECTION = 0;
  START_LONG = 1; // Down
  END_LONG = 2;   // Up
  SHORT = 3;      // Click
}

message RemotePingRequest {
  int32 val1 = 1;
}

message RemotePingResponse {
  int32 val1 = 1;
}
